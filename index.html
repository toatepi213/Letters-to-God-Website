<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letters to God</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">

        <div class="navbar">
           <div class="logo-section">
                <a href="#"><img src="logo/blue red and stamp.png" alt="Logo"></a>
                <h1>Letters to God</h1>
            </div>

            <div class="menu">
                <a href="#">Home</a>
                <a href="#">Past Prayers</a>
                <a href="#">About</a>
            </div>
        </div>


        <div class="banner">
            <img src="logo/banner2.png" alt="Auckland at night">
        </div>



        <div class="emojis">
            <h3>How I feel right now</h3><br>
            <span style='font-size:100px;'>&#128519;</span>
            Blessed
            <span style='font-size:100px;'>&#128512;</span>
            Happy
            <span style='font-size:100px;'>&#128522;</span>
            Smily
            <span style='font-size:100px;'>&#128554;</span>
            Sleepy
            <span style='font-size:100px;'>&#128558;</span>
            Surprise
            <span style='font-size:100px;'>&#128557;</span>
            Crying
            <span style='font-size:100px;'>&#128566;</span>
            Others
        </div>


        <div class="letter">
                <h2>Write Your Prayer</h2>
                    <textarea
                        id="prayerBox"
                        placeholder="Dear God, today I am grateful for..."
                        rows="10"
                        cols="80">
                    </textarea>
                <br><br>

                <button type="button">Save Prayer</button>
        </div>



        <div class="quotes">Quote for the day</div>
        <div class="verse">Verse for the day</div>
        <div class="past_prayers">My Previous Prayers</div>
        <div class="footer">
            Toatepi Kalekava Mau <br>
            Auckland Seventh Day Adventist High School<br>
            2026 <br>
        </div>
    </div>

</body>
</html>
